name: Generate Model Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/generate_artifacts.py'
      - '.github/workflows/generate-model-artifacts.yml'
      - 'data/listings_master_llm.csv'

# Fix Node.js warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib scikit-learn

      - name: Run artifact generation
        run: |
          python scripts/generate_artifacts.py

      - name: Commit and push artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add artifacts/
          git commit -m "Generate model artifacts" || echo "No changes to commit"
          git push
