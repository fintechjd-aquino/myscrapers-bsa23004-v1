name: Data Sync Hourly Predictions to Repo

on:
  schedule:
    - cron: '45 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sync-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.PROJECT_ID }}

      - name: Prepare local folders
        run: |
          mkdir -p results
          mkdir -p /tmp/preds_sync

      - name: Copy prediction folders from GCS (fast parallel)
        shell: bash
        run: |
          set -euo pipefail
          gsutil -m cp -r "gs://${{ vars.BUCKET_NAME }}/structured/preds/*" /tmp/preds_sync/ || true

      - name: Flatten preds.csv files into results
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            run_id=$(basename "$(dirname "$file")")
            cp "$file" "results/${run_id}-preds.csv"
          done < <(find /tmp/preds_sync -type f -name "preds.csv" | sort)

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add results/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "🤖 Data Sync: Add hourly prediction files"
          git push
