name: Data Sync Hourly Predictions to Repo

on:
  schedule:
    - cron: '45 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.PROJECT_ID }}

      - name: Verify gcloud auth
        run: |
          gcloud auth list
          gcloud config list project

      - name: Create results folder
        run: mkdir -p results

      - name: Copy prediction files from GCS into results
        shell: bash
        run: |
          set -euo pipefail

          paths=$(gsutil ls "gs://${{ vars.BUCKET_NAME }}/structured/preds/*/preds.csv" || true)

          if [ -z "$paths" ]; then
            echo "No prediction files found in GCS."
            exit 0
          fi

          while IFS= read -r path; do
            [ -z "$path" ] && continue
            run_id=$(echo "$path" | sed -E 's|.*/structured/preds/([0-9]+)/preds\.csv|\1|')
            echo "Copying $path -> results/${run_id}-preds.csv"
            gsutil cp "$path" "results/${run_id}-preds.csv"
          done <<< "$paths"

      - name: Show synced files
        run: ls -lah results || true

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add results/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "🤖 Data Sync: Add hourly prediction files"
          git push
